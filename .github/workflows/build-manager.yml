name: Build Manager

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version Code'
        required: false
        type: string
  workflow_call:
    inputs:
      version_code:
        required: false
        type: string
        default: ''

jobs:
  setup-version:
    runs-on: ubuntu-latest
    outputs:
      version_code: ${{ steps.determine.outputs.VERSION_CODE }}
      version_name: ${{ steps.determine.outputs.VERSION_NAME }}
    steps:
      - name: Determine version code and name
        id: determine
        run: |
          if [ -n "${{ inputs.version_code }}" ]; then
            echo "VERSION_CODE=${{ inputs.version_code }}" >> $GITHUB_OUTPUT
          else
            COMMIT_COUNT=$(curl -s "https://api.github.com/repos/midori01/KernelSU/commits?per_page=1" -I 2>&1 | grep "link:" | grep -oP '&page=\K\d+(?=>; rel="last")')
            if [ -z "$COMMIT_COUNT" ]; then
              echo "::warning::Failed to fetch commit count, using default 0"
              COMMIT_COUNT=0
            fi
            VERSION=$((30999 + COMMIT_COUNT))
            echo "VERSION_CODE=$VERSION" >> $GITHUB_OUTPUT
            echo "[+] Generated version code: $VERSION (commits: $COMMIT_COUNT)"
          fi
          TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/tags" \
            | jq -r '.[].ref | select(test("refs/tags/v"))' \
            | sort -V | tail -n 1 | sed 's|refs/tags/||')
          echo "VERSION_NAME=${TAG#v}" >> $GITHUB_OUTPUT
          echo "[+] Version name: ${TAG#v}"

  generate-key:
    runs-on: ubuntu-latest
    outputs:
      expected_size: ${{ steps.extract.outputs.expected_size }}
      expected_hash: ${{ steps.extract.outputs.expected_hash }}
      keystore: ${{ steps.gen.outputs.keystore }}
      keystore_password: ${{ steps.gen.outputs.keystore_password }}
      key_password: ${{ steps.gen.outputs.key_password }}
    steps:
      - name: Generate temporary keystore
        if: github.event_name == 'pull_request'
        id: gen
        run: |
          KEYSTORE_PASSWORD=$(openssl rand -hex 32)
          KEY_PASSWORD=$(openssl rand -hex 32)
          echo "keystore_password=$KEYSTORE_PASSWORD" >> $GITHUB_OUTPUT
          echo "key_password=$KEY_PASSWORD" >> $GITHUB_OUTPUT

          keytool -genkeypair \
            -alias pr-key \
            -keyalg RSA -keysize 2048 \
            -validity 1 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=KernelSU PR Build" \
            -storetype JKS \
            -keystore pr-key.jks

          echo "keystore=$(base64 -w 0 pr-key.jks)" >> $GITHUB_OUTPUT

      - name: Extract certificate hash and size
        if: github.event_name == 'pull_request'
        id: extract
        env:
          STORE_PASS: ${{ steps.gen.outputs.keystore_password }}
        run: |
          keytool -exportcert \
            -alias pr-key \
            -keystore pr-key.jks \
            -storepass "$STORE_PASS" \
            -file pr-cert.der

          SIZE_DEC=$(stat -c%s pr-cert.der)
          SIZE_HEX=$(printf '0x%04x' "$SIZE_DEC")
          echo "expected_size=$SIZE_HEX" >> $GITHUB_OUTPUT

          HASH=$(sha256sum pr-cert.der | awk '{print $1}')
          echo "expected_hash=$HASH" >> $GITHUB_OUTPUT

          echo "Certificate size: $SIZE_HEX ($SIZE_DEC bytes)"
          echo "Certificate hash: $HASH"

  build-lkm:
    needs: [setup-version, generate-key]
    uses: ./.github/workflows/build-lkm.yml
    with:
      expected_pr_build_size: ${{ needs.generate-key.outputs.expected_size || '' }}
      expected_pr_build_hash: ${{ needs.generate-key.outputs.expected_hash || '' }}
      version_code: ${{ needs.setup-version.outputs.version_code || '' }}
    secrets: inherit

  build-ksuinit:
    uses: ./.github/workflows/ksuinit.yml

  build-ksud:
    needs: [setup-version, build-lkm, build-ksuinit]
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            os: ubuntu-latest
          - target: x86_64-linux-android
            os: ubuntu-latest
          - target: armv7-linux-androideabi
            os: ubuntu-latest
    uses: ./.github/workflows/ksud.yml
    with:
      target: ${{ matrix.target }}
      os: ${{ matrix.os }}
      version_code: ${{ needs.setup-version.outputs.version_code || '' }}
      version_name: ${{ needs.setup-version.outputs.version_name || '' }}

  build-manager:
    needs: [setup-version, generate-key]
    runs-on: ubuntu-latest
    if: always() && needs.generate-key.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - manager_type: "normal"
            build_type: "release"
    defaults:
      run:
        working-directory: ./manager

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine commit for build
        id: commit
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            echo "COMMIT_SHA=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Determine manager variant
        id: determine
        run: |
          echo "title=Manager" >> $GITHUB_OUTPUT

      - name: Write key
        if: ${{ github.event_name == 'workflow_dispatch' || ( github.event_name != 'pull_request') || github.ref_type == 'tag' }}
        run: |
          if [ ! -z "${{ secrets.KEYSTORE }}" ]; then
            {
              echo KEYSTORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}'
              echo KEY_ALIAS='${{ secrets.KEY_ALIAS }}'
              echo KEY_PASSWORD='${{ secrets.KEY_PASSWORD }}'
              echo KEYSTORE_FILE='key.jks'
            } >> gradle.properties
            echo "${{ secrets.KEYSTORE }}" | base64 -d > key.jks
          fi

      - name: Write PR key
        if: github.event_name == 'pull_request'
        env:
          PR_KEYSTORE: ${{ needs.generate-key.outputs.keystore }}
          PR_KEYSTORE_PASSWORD: ${{ needs.generate-key.outputs.keystore_password }}
          PR_KEY_PASSWORD: ${{ needs.generate-key.outputs.key_password }}
        run: |
          echo "$PR_KEYSTORE" | base64 -d > pr-key.jks
          {
            echo KEYSTORE_PASSWORD="$PR_KEYSTORE_PASSWORD"
            echo KEY_ALIAS='pr-key'
            echo KEY_PASSWORD="$PR_KEY_PASSWORD"
            echo KEYSTORE_FILE='pr-key.jks'
          } >> gradle.properties

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Build APK
        env:
          MANAGER_VERSION_CODE: ${{ needs.setup-version.outputs.version_code }}
          MANAGER_VERSION_NAME: ${{ needs.setup-version.outputs.version_name }}
        run: |
          VERSION_ARG="-PmanagerVersionCode=$MANAGER_VERSION_CODE -PmanagerVersionName=$MANAGER_VERSION_NAME"
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            ./gradlew assemble${{ matrix.build_type }} -Pcommit=${{ steps.commit.outputs.COMMIT_SHA }} -PIS_PR_BUILD=true $VERSION_ARG
          else
            ./gradlew assemble${{ matrix.build_type }} -Pcommit=${{ steps.commit.outputs.COMMIT_SHA }} $VERSION_ARG
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Manager-gradle-${{ matrix.build_type }}
          path: |
            manager/app/build/outputs/apk/release/*.apk

      - name: Upload mappings
        uses: actions/upload-artifact@v7
        with:
          name: "Manager-mappings"
          path: "manager/app/build/outputs/mapping/release/"
          if-no-files-found: ignore

  repack-manager:
    if: always() && needs.build-manager.result == 'success' && needs.build-ksud.result == 'success'
    needs: [build-manager, build-ksud, generate-key]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - manager_type: "normal"
            build_type: "release"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine manager variant
        id: determine
        run: |
          echo "title=Manager" >> $GITHUB_OUTPUT

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: Manager-gradle-${{ matrix.build_type }}
          path: artifacts/Manager-gradle-${{ matrix.build_type }}

      - name: Download arm64 ksud
        uses: actions/download-artifact@v8
        with:
          name: ksud-aarch64-linux-android
          path: artifacts/ksud-aarch64-linux-android

      - name: Download x86_64 ksud
        uses: actions/download-artifact@v8
        with:
          name: ksud-x86_64-linux-android
          path: artifacts/ksud-x86_64-linux-android

      - name: Download arm ksud
        uses: actions/download-artifact@v8
        with:
          name: ksud-armv7-linux-androideabi
          path: artifacts/ksud-armv7-linux-androideabi

      - name: Place manager apk and ksud artifacts
        run: |
          mkdir -p manager/app/build/outputs/apk/${{ matrix.build_type }}
          APKS=$(find artifacts/Manager-gradle-${{ matrix.build_type }} -type f -name "*.apk")
          APKS=$(echo "$APKS" | tr '\n' ' ')
          test -n "$APKS"
          cp -f $APKS manager/app/build/outputs/apk/${{ matrix.build_type }}/

          mkdir -p target/aarch64-linux-android/release
          mkdir -p target/armv7-linux-androideabi/release
          mkdir -p target/x86_64-linux-android/release
          ARM64_KSUD=$(find artifacts/ksud-aarch64-linux-android -type f -name ksud | head -n 1)
          ARMV7_KSUD=$(find artifacts/ksud-armv7-linux-androideabi -type f -name ksud | head -n 1)
          X86_64_KSUD=$(find artifacts/ksud-x86_64-linux-android -type f -name ksud | head -n 1)
          test -n "$ARM64_KSUD"
          test -n "$ARMV7_KSUD"
          test -n "$X86_64_KSUD"
          cp -f "$ARM64_KSUD" target/aarch64-linux-android/release/ksud
          cp -f "$ARMV7_KSUD" target/armv7-linux-androideabi/release/ksud
          cp -f "$X86_64_KSUD" target/x86_64-linux-android/release/ksud

      - name: Prepare signing inputs
        id: prepare
        env:
          PR_KEYSTORE: ${{ needs.generate-key.outputs.keystore }}
          PR_KEYSTORE_PASSWORD: ${{ needs.generate-key.outputs.keystore_password }}
          PR_KEY_PASSWORD: ${{ needs.generate-key.outputs.key_password }}
          PROD_KEYSTORE: ${{ secrets.KEYSTORE }}
          PROD_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          PROD_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          PROD_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Using PR temporary keystore"
            echo "$PR_KEYSTORE" | base64 -d > pr-key.jks
            echo "SIGN_KEYSTORE_FILE=pr-key.jks" >> $GITHUB_ENV
            echo "SIGN_KEY_ALIAS=pr-key" >> $GITHUB_ENV
            echo "SIGN_KEYSTORE_PASSWORD=$PR_KEYSTORE_PASSWORD" >> $GITHUB_ENV
            echo "SIGN_KEY_PASSWORD=$PR_KEY_PASSWORD" >> $GITHUB_ENV
          elif [ -n "$PROD_KEYSTORE" ]; then
            echo "Using production keystore"
            echo "$PROD_KEYSTORE" | base64 -d > key.jks
            echo "SIGN_KEYSTORE_FILE=key.jks" >> $GITHUB_ENV
            echo "SIGN_KEY_ALIAS=$PROD_KEY_ALIAS" >> $GITHUB_ENV
            echo "SIGN_KEYSTORE_PASSWORD=$PROD_KEYSTORE_PASSWORD" >> $GITHUB_ENV
            echo "SIGN_KEY_PASSWORD=$PROD_KEY_PASSWORD" >> $GITHUB_ENV
          else
            echo "No keystore configured, generating debug keystore"
            keytool -genkeypair \
              -alias debug-key \
              -keyalg RSA -keysize 2048 \
              -validity 365 \
              -storepass debugpw \
              -keypass debugpw \
              -dname "CN=Debug" \
              -storetype JKS \
              -keystore debug.jks
            echo "SIGN_KEYSTORE_FILE=debug.jks" >> $GITHUB_ENV
            echo "SIGN_KEY_ALIAS=debug-key" >> $GITHUB_ENV
            echo "SIGN_KEYSTORE_PASSWORD=debugpw" >> $GITHUB_ENV
            echo "SIGN_KEY_PASSWORD=debugpw" >> $GITHUB_ENV
          fi

      - name: Repack and resign
        run: |
          python3 repack_apk_multi.py repack \
            -b ${{ matrix.build_type }} \
            -t release \
            -a arm64-v8a \
            -a armeabi-v7a \
            -a x86_64 \
            -K "$SIGN_KEYSTORE_FILE" \
            -A "$SIGN_KEY_ALIAS" \
            -P "$SIGN_KEYSTORE_PASSWORD" \
            -S "$SIGN_KEY_PASSWORD" \
            --strip

      - name: Delete gradle build
        uses: GeekyEggo/delete-artifact@v6
        with:
          name: Manager-gradle-${{ matrix.build_type }}

      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags --force 2>/dev/null || true
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/git/refs/tags" \
              | jq -r '.[].ref | select(test("refs/tags/v"))' \
              | sort -V | tail -n 1 | sed 's|refs/tags/||')
          fi
          if [ -z "$LATEST_TAG" ]; then
            echo "::error::No tags found!"
            exit 1
          fi
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Delete old release assets
        run: |
          RELEASE_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.get_tag.outputs.tag }} \
            | jq -r '.id')
          curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets" \
            | jq -r '.[].id' \
            | while read ASSET_ID; do
              echo "Deleting asset $ASSET_ID"
              curl -s -X DELETE \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/releases/assets/$ASSET_ID"
            done

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: dist/*.apk
          append_body: true
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
