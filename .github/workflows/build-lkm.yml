name: Build LKM for KernelSU
on:
  workflow_call:
    inputs:
      expected_pr_build_size:
        description: 'Second expected signature size (for PR builds)'
        required: false
        default: ''
        type: string
      expected_pr_build_hash:
        description: 'Second expected signature hash (for PR builds)'
        required: false
        default: ''
        type: string
      version_code:
        description: 'Manager version code'
        required: false
        default: ''
        type: string
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version Code'
        required: false
        type: string
jobs:
  build-lkm:
    strategy:
      fail-fast: false
      matrix:
        kmi:
          - android14-6.1
          - android15-6.6
          - android16-6.12
    uses: ./.github/workflows/ddk-lkm.yml
    with:
      kmi: ${{ matrix.kmi }}
      ddk_release: '20260313'
      expected_pr_build_size: ${{ inputs.expected_pr_build_size || '' }}
      expected_pr_build_hash: ${{ inputs.expected_pr_build_hash || '' }}
      version_code: ${{ inputs.version_code || '' }}
