name: Build MidoriSU Manager

on:
  workflow_call:
  workflow_dispatch:

jobs:
  generate-key:
    runs-on: ubuntu-latest
    outputs:
      expected_size: ${{ steps.extract.outputs.expected_size }}
      expected_hash: ${{ steps.extract.outputs.expected_hash }}
    steps:
      - name: Use fixed keystore or generate temporary
        id: gen
        run: |
          if [ ! -z "${{ secrets.KEYSTORE }}" ]; then
            echo "${{ secrets.KEYSTORE }}" | base64 -d > pr-key.jks
            STORE_PASS="${{ secrets.KEYSTORE_PASSWORD }}"
          else
            STORE_PASS=$(openssl rand -hex 32)
            KEY_PASS=$(openssl rand -hex 32)

            keytool -genkeypair \
              -alias pr-key \
              -keyalg RSA -keysize 2048 \
              -validity 1 \
              -storepass "$STORE_PASS" \
              -keypass "$KEY_PASS" \
              -dname "CN=KernelSU PR Build" \
              -storetype JKS \
              -keystore pr-key.jks
          fi

          echo "store_pass=$STORE_PASS" >> $GITHUB_OUTPUT

      - name: Extract certificate hash and size
        id: extract
        run: |
          if [ ! -z "${{ secrets.KEYSTORE }}" ]; then
            CERT_ALIAS="${{ secrets.KEY_ALIAS }}"
          else
            CERT_ALIAS="pr-key"
          fi

          keytool -exportcert \
            -alias "$CERT_ALIAS" \
            -keystore pr-key.jks \
            -storepass "${{ steps.gen.outputs.store_pass }}" \
            -file pr-cert.der

          SIZE_DEC=$(stat -c%s pr-cert.der)
          SIZE_HEX=$(printf '0x%04x' "$SIZE_DEC")
          echo "expected_size=$SIZE_HEX" >> $GITHUB_OUTPUT

          HASH=$(sha256sum pr-cert.der | awk '{print $1}')
          echo "expected_hash=$HASH" >> $GITHUB_OUTPUT

  build-lkm:
    needs: generate-key
    uses: ./.github/workflows/build-lkm.yml
    with:
      expected_size2: ${{ needs.generate-key.outputs.expected_size || '' }}
      expected_hash2: ${{ needs.generate-key.outputs.expected_hash || '' }}
    secrets: inherit

  build-ksuinit:
    uses: ./.github/workflows/ksuinit.yml

  build-ksud:
    needs: [build-lkm, build-ksuinit, build-manager]
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
          - target: armv7-linux-androideabi
          - target: x86_64-linux-android
    uses: ./.github/workflows/ksud.yml
    with:
      target: ${{ matrix.target }}
      pack_lkm: true
      pack_ksuinit: true
      version_name: ${{ needs.build-manager.outputs.build_ver }}

  build-manager:
    needs: [generate-key]
    if: always() && needs.generate-key.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      build_ver: ${{ steps.ver.outputs.BUILD_VER }}
    defaults:
      run:
        working-directory: ./manager
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate build version
        id: ver
        run: |
          export TZ=Asia/Tokyo
          echo "BUILD_VER=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Write key
        run: |
          if [ ! -z "${{ secrets.KEYSTORE }}" ]; then
            {
              echo KEYSTORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}'
              echo KEY_ALIAS='${{ secrets.KEY_ALIAS }}'
              echo KEY_PASSWORD='${{ secrets.KEY_PASSWORD }}'
              echo KEYSTORE_FILE='key.jks'
            } >> gradle.properties
            echo "${{ secrets.KEYSTORE }}" | base64 -d > key.jks
          else
            echo "::warning::No KEYSTORE secret, APK will not be signed properly"
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Build with Gradle
        env:
          KSU_VERSION_NAME: ${{ steps.ver.outputs.BUILD_VER }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ./gradlew clean assembleRelease -PIS_PR_BUILD=true -PVERSION_NAME="${{ steps.ver.outputs.BUILD_VER }}"
          else
            ./gradlew clean assembleRelease -PVERSION_NAME="${{ steps.ver.outputs.BUILD_VER }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: manager-gradle
          path: manager/app/build/outputs/apk/release/*.apk

      - name: Upload mappings
        uses: actions/upload-artifact@v7
        if: ${{ ( github.event_name != 'pull_request') || github.ref_type == 'tag' }}
        with:
          name: "mappings"
          path: "manager/app/build/outputs/mapping/release/"

  repack-manager:
    needs: [build-manager, build-ksud, generate-key]
    if: always() && needs.build-manager.result == 'success' && needs.build-ksud.result == 'success' && needs.generate-key.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Release Tag
        id: date_tag
        run: |
          export TZ=Asia/Tokyo
          TAG_NAME=$(date +'%Y.%m.%d-%H%M%S')
          echo "RELEASE_TAG=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Download gradle manager artifact
        uses: actions/download-artifact@v8
        with:
          name: manager-gradle
          path: artifacts/manager-gradle

      - name: Download arm64 ksud
        uses: actions/download-artifact@v8
        with:
          name: ksud-aarch64-linux-android
          path: artifacts/ksud-aarch64-linux-android

      - name: Download arm ksud
        uses: actions/download-artifact@v8
        with:
          name: ksud-armv7-linux-androideabi
          path: artifacts/ksud-armv7-linux-androideabi

      - name: Download x86_64 ksud
        uses: actions/download-artifact@v8
        with:
          name: ksud-x86_64-linux-android
          path: artifacts/ksud-x86_64-linux-android

      - name: Place manager apk and ksud artifacts
        run: |
          mkdir -p manager/app/build/outputs/apk/release
          APK=$(find artifacts/manager-gradle -type f -name "*.apk" | head -n 1)
          cp -f "$APK" manager/app/build/outputs/apk/release/

          mkdir -p target/aarch64-linux-android/release
          mkdir -p target/armv7-linux-androideabi/release
          mkdir -p target/x86_64-linux-android/release
          ARM64_KSUD=$(find artifacts/ksud-aarch64-linux-android -type f -name ksud | head -n 1)
          ARM_KSUD=$(find artifacts/ksud-armv7-linux-androideabi -type f -name ksud | head -n 1)
          X86_64_KSUD=$(find artifacts/ksud-x86_64-linux-android -type f -name ksud | head -n 1)
          test -n "$ARM64_KSUD"
          test -n "$ARM_KSUD"
          test -n "$X86_64_KSUD"
          cp -f "$ARM64_KSUD" target/aarch64-linux-android/release/ksud
          cp -f "$ARM_KSUD" target/armv7-linux-androideabi/release/ksud
          cp -f "$X86_64_KSUD" target/x86_64-linux-android/release/ksud

      - name: Prepare signing inputs
        run: |
          if [ ! -z "${{ secrets.KEYSTORE }}" ]; then
            echo "${{ secrets.KEYSTORE }}" | base64 -d > key.jks
            echo "SIGN_KEYSTORE_FILE=key.jks" >> $GITHUB_ENV
            echo "SIGN_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "SIGN_KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "SIGN_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "::error::No KEYSTORE secret, cannot repack"
            exit 1
          fi

      - name: Repack and resign
        run: |
          python3 repack_apk.py repack \
            -b release \
            -t release \
            -a arm64-v8a \
            -a armeabi-v7a \
            -a x86_64 \
            -K "$SIGN_KEYSTORE_FILE" \
            -A "$SIGN_KEY_ALIAS" \
            -P "$SIGN_KEYSTORE_PASSWORD" \
            -S "$SIGN_KEY_PASSWORD" \
            --strip

      - name: Upload to GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.apk
          tag_name: ${{ steps.date_tag.outputs.RELEASE_TAG }}
          name: Release ${{ steps.date_tag.outputs.RELEASE_TAG }}
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
